<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== MENÚ DE CONFIGURACIÓN ===== -->
  <div id="menu" class="overlay">
    <div class="menu-box menu-wide">
      <h1>Deck Game</h1>
      <p class="subtitle">Roguelike por turnos</p>

      <label>
        Personajes (tuyos)
        <input id="numPlayers" type="number" min="1" max="4" value="2" />
      </label>

      <label>
        Clase
        <select id="playerClass">
          <option value="warrior">Guerrero — Furia (0 maná, 4 daño)</option>
          <option value="mage">Mago — Chispa (0 maná, 2 daño área)</option>
          <option value="healer">Sanador — Aliento (0 maná, 4 cura)</option>
          <option value="ranger">Explorador — Disparo (0 maná, 5 daño)</option>
        </select>
      </label>

      <p class="hint">Empezás con golpes y escudos de 1 maná + la habilidad de tu clase. Los enemigos por piso son aleatorios.</p>

      <button id="startBtn" class="primary">Comenzar run</button>
    </div>
  </div>

  <!-- ===== RECOMPENSA DE PISO ===== -->
  <div id="reward" class="overlay hidden">
    <div class="menu-box menu-wide">
      <h1>Piso superado</h1>
      <p id="rewardText" class="subtitle">Elegí una carta para tu mazo o omití.</p>
      <div id="rewardCards" class="reward-cards"></div>
      <button id="skipRewardBtn" class="secondary">Omitir</button>
    </div>
  </div>

  <!-- ===== PANTALLA FINAL ===== -->
  <div id="gameOver" class="overlay hidden">
    <div class="menu-box">
      <h1 id="gameOverTitle">Fin de la run</h1>
      <p id="gameOverSub" class="subtitle"></p>
      <button id="restartBtn" class="primary">Jugar de nuevo</button>
    </div>
  </div>

  <!-- ===== JUEGO ===== -->
  <div id="game" class="hidden">
    <header id="topbar">
      <div id="floorLabel">Piso 1</div>
      <div id="turnLabel">Turno del jugador</div>
      <div id="manaLabel">Maná: 3 / 3</div>
      <div id="deckLabel">Mazo: 0 · Descarte: 0</div>
      <button id="endTurnBtn" class="primary">Finalizar turno</button>
    </header>

    <main id="board">
      <section id="playersZone" class="unit-zone">
        <h2>Tus personajes</h2>
        <div id="players" class="units"></div>
      </section>

      <section id="enemiesZone" class="unit-zone">
        <h2>Enemigos</h2>
        <div id="enemies" class="units"></div>
      </section>
    </main>

    <footer id="handZone">
      <div id="hand" class="hand"></div>
    </footer>

    <div id="log"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
